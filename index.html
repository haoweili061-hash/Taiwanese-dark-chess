<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台式暗棋 Taiwanese dark chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="audio-controls">
    <button id="musicToggleBtn" type="button">音樂 Off</button>
    <button id="soundToggleBtn" type="button">音效 On</button>
  </div>

  <div id="menuScreen" class="screen">
    <div class="menu-card wide-menu">
      <h1><span>台式暗棋</span><span>Taiwanese dark chess</span></h1>

      <section class="account-panel">
        <div>
          <h2>玩家帳號</h2>
          <p id="accountStatus">尚未登入</p>
        </div>
        <div class="auth-grid">
          <input type="text" id="usernameInput" placeholder="輸入帳號">
          <input type="password" id="passwordInput" placeholder="密碼至少 8 碼" minlength="8">
          <button id="loginBtn">登入</button>
          <button id="registerBtn">建立帳號</button>
        </div>
        <div class="field-hint">帳號不可重複，密碼需 8 碼以上。</div>
      </section>

      <section class="mode-panel">
        <button id="startLocalBtn">單機對戰</button>
        <button id="startAiBtn">人機對戰</button>
        <button id="quickMatchBtn">快速配對</button>
        <button id="onlineGameBtn">房間對戰</button>
        <label class="ranked-toggle"><input type="checkbox" id="rankedRule"> 排位模式</label>
      </section>

      <section class="settings-panel">
        <h2>對局設定</h2>
        <div class="menu-rules compact-rules">
          <label><input type="checkbox" id="darkEatRule" checked> 暗吃</label>
          <label><input type="checkbox" id="comboRule" checked> 連吃</label>
          <label><input type="checkbox" id="rookRule" checked> 車衝</label>
          <label><input type="checkbox" id="cannonRule" checked> 炮飛</label>
          <label><input type="checkbox" id="horseRule" checked> 馬斜</label>
        </div>
        <div class="draw-setting clean-draw-setting">
          <label for="drawLimitInput"><span>平局回合數</span><small>連續未吃子達上限則平局</small></label>
          <input type="number" id="drawLimitInput" value="25" min="5" max="100">
        </div>
        <div class="draw-setting clean-draw-setting">
          <label for="turnTimeInput"><span>每回合秒數</span><small>超時會自動判負，15 到 300 秒</small></label>
          <input type="number" id="turnTimeInput" value="60" min="15" max="300">
        </div>
      </section>

      <section class="profile-card">
        <h2>戰績紀錄</h2>
        <div id="profileStats">登入後顯示排位分數與歷史紀錄。</div>
        <div id="historyList" class="history-list"></div>
      </section>

      <section class="leaderboard-card">
        <h2>排行榜</h2>
        <div class="field-hint">僅顯示 1200 分以上玩家。</div>
        <div id="leaderboardList" class="history-list"></div>
      </section>
    </div>
  </div>

  <div id="onlineScreen" class="screen hidden">
    <div class="menu-card">
      <h1>房間對戰</h1>
      <p>建立房間，或輸入房號加入。第三位之後會自動成為觀戰者。</p>

      <button id="createRoomBtn">建立房間</button>

      <div class="room-input">
        <label for="roomCodeInput">房間代碼</label>
        <input type="text" id="roomCodeInput" maxlength="6" placeholder="例如 A7K9Q2">
      </div>

      <button id="joinRoomBtn">加入房間 / 觀戰</button>
      <button id="backFromOnlineBtn">返回</button>
      <div id="onlineStatus"></div>
    </div>
  </div>

  <div id="gameScreen" class="game-layout hidden">
    <div class="info-panel">
      <h3>紅方棋況</h3>
      <div id="redCount"></div>
      <div id="redInfo"></div>
    </div>

    <main class="game">
      <h1><span>台式暗棋</span><span>Taiwanese dark chess</span></h1>

      <div id="roomBar" class="room-bar hidden">
        <span id="roomLabel"></span>
        <button id="copyRoomBtn">複製房號</button>
      </div>

      <div id="scoreText" class="score-text">比分 紅 0 : 0 黑</div>
      <div id="playerNamesText" class="player-names-text">紅方 vs 黑方</div>
      <div id="turnTimerText" class="turn-timer-text">本回合 60 秒</div>
      <div id="timerText" class="timer-text">對局時間 00:00</div>

      <div class="actions">
        <button id="surrenderBtn">投降</button>
        <button id="restartBtn">再來一局</button>
        <button id="backMenuBtn">回主選單</button>
      </div>

      <div id="status"></div>
      <div id="board"></div>

      <div class="log-panel">
        <h3>戰鬥紀錄</h3>
        <div id="battleLog"></div>
      </div>
    </main>

    <div class="info-panel">
      <h3>黑方棋況</h3>
      <div id="blackCount"></div>
      <div id="blackInfo"></div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
